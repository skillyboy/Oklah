<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="theme-color" content="#0D4C8F" />
<meta name="description" content="Professional email, Microsoft 365, business websites and graphics for growing businesses worldwide. Setup in 48 hours. From $29/year." />
<title>Oklah Hub — Professional Email, Microsoft 365 &amp; Business Websites</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>
/* ── TOKENS ── */
:root{
  --bg:#ffffff;--bg-alt:#F8FAFC;--bg-subtle:#F1F5F9;
  --text:#0F172A;--muted:#64748B;--faint:#94A3B8;
  --border:#E2E8F0;--card:#ffffff;
  --navy:#0D4C8F;--navy-d:#071E3D;--navy-m:#1565C0;
  --sky:#0EA5E9;--orange:#F97316;--orange-s:#FB923C;
  --green:#25D366;--green-d:#128C7E;
  --sh-sm:0 1px 3px rgba(0,0,0,.04),0 6px 16px rgba(15,23,42,.07);
  --sh-md:0 4px 8px rgba(0,0,0,.04),0 16px 40px rgba(15,23,42,.10);
  --sh-lg:0 8px 16px rgba(0,0,0,.06),0 32px 64px rgba(15,23,42,.13);
  --sh-hover:0 8px 20px rgba(0,0,0,.06),0 28px 56px rgba(15,23,42,.15);
  --ease:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.34,1.56,.64,1);
}
[data-theme="dark"]{
  --bg:#060C1A;--bg-alt:#0A1120;--bg-subtle:#0F1B30;
  --text:#F1F5F9;--muted:#94A3B8;--faint:#64748B;
  --border:rgba(255,255,255,.08);--card:rgba(255,255,255,.04);
  --sh-sm:0 1px 3px rgba(0,0,0,.4),0 6px 16px rgba(0,0,0,.25);
  --sh-md:0 4px 8px rgba(0,0,0,.4),0 16px 40px rgba(0,0,0,.3);
  --sh-hover:0 8px 20px rgba(0,0,0,.45),0 28px 56px rgba(0,0,0,.35);
}

/* ── RESET ── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;overflow-x:hidden;transition:background .3s,color .3s}
input,textarea,button,select{font-family:inherit}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:9999;background:#071E3D;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:18px;transition:opacity .5s ease,visibility .5s ease}
#loader.out{opacity:0;visibility:hidden;pointer-events:none}
.ld-ring{width:44px;height:44px;border-radius:50%;border:3px solid rgba(255,255,255,.08);border-top-color:#0EA5E9;animation:spin .8s linear infinite}

/* ── PROGRESS ── */
#progress-bar{position:fixed;top:0;left:0;height:2px;z-index:9999;background:linear-gradient(90deg,var(--navy),var(--sky),var(--orange));width:0%;transition:width .08s linear;pointer-events:none}

/* ── REVEAL ── */
.rv{opacity:0;transform:translateY(28px);transition:opacity .65s var(--ease),transform .65s var(--ease)}
.rv.on{opacity:1;transform:none}
.rv-l{opacity:0;transform:translateX(-32px);transition:opacity .65s var(--ease),transform .65s var(--ease)}
.rv-l.on{opacity:1;transform:none}
.rv-r{opacity:0;transform:translateX(32px);transition:opacity .65s var(--ease),transform .65s var(--ease)}
.rv-r.on{opacity:1;transform:none}
.rv-sc{opacity:0;transform:scale(.93);transition:opacity .55s var(--ease),transform .55s var(--ease)}
.rv-sc.on{opacity:1;transform:none}
.d1{transition-delay:.07s}.d2{transition-delay:.14s}.d3{transition-delay:.21s}.d4{transition-delay:.28s}.d5{transition-delay:.35s}.d6{transition-delay:.42s}

/* ── NAV ── */
.nav-glass{background:rgba(255,255,255,.88);backdrop-filter:saturate(200%) blur(20px);-webkit-backdrop-filter:saturate(200%) blur(20px);border-bottom:1px solid rgba(15,23,42,.06);box-shadow:0 2px 20px rgba(15,23,42,.05)}
[data-theme="dark"] .nav-glass{background:rgba(6,12,26,.9);border-bottom-color:rgba(255,255,255,.06)}
.nav-a{position:relative;text-decoration:none;font-size:14px;font-weight:500;color:var(--muted);transition:color .2s;padding:4px 0}
.nav-a::after{content:'';position:absolute;bottom:-2px;left:0;right:0;height:2px;border-radius:2px;background:linear-gradient(90deg,var(--navy),var(--sky));transform:scaleX(0);transform-origin:left;transition:transform .3s var(--ease)}
.nav-a:hover,.nav-a.act{color:var(--navy)}
[data-theme="dark"] .nav-a:hover,[data-theme="dark"] .nav-a.act{color:var(--sky)}
.nav-a.act::after{transform:scaleX(1)}

/* ── MOB MENU ── */
.mob-menu{position:fixed;inset:0;z-index:150;background:var(--bg);display:flex;flex-direction:column;padding:76px 24px 40px;animation:slideIn .28s var(--ease) both;overflow-y:auto}
.mob-a{color:var(--text);text-decoration:none;font-size:20px;font-weight:700;padding:18px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;transition:color .15s}
.mob-a:hover{color:var(--navy)}
.mob-a::after{content:'→';color:var(--faint);font-weight:400;font-size:17px}

/* ── BUTTONS ── */
.btn{transition:transform .15s var(--spring),box-shadow .2s!important}
.btn:active{transform:scale(.96)!important}
.btn-g{display:inline-flex;align-items:center;justify-content:center;gap:9px;padding:14px 26px;border-radius:12px;font-weight:800;font-size:15px;text-decoration:none;border:none;cursor:pointer;background:linear-gradient(135deg,#25D366,#128C7E);color:#fff;box-shadow:0 4px 20px rgba(37,211,102,.32);animation:glow-g 3s ease-in-out infinite}
.btn-g:hover{transform:translateY(-2px)!important;box-shadow:0 8px 32px rgba(37,211,102,.48)!important}
.btn-p{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;border:none;cursor:pointer;background:linear-gradient(135deg,var(--navy),var(--sky));color:#fff;box-shadow:0 4px 16px rgba(13,76,143,.28)}
.btn-p:hover{transform:translateY(-1px)!important;box-shadow:0 8px 28px rgba(13,76,143,.38)!important}
.btn-o{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 22px;border-radius:12px;font-weight:600;font-size:14px;text-decoration:none;cursor:pointer;background:transparent;color:var(--text);border:1.5px solid var(--border);transition:border-color .2s,color .2s,background .2s,transform .15s}
.btn-o:hover{border-color:var(--navy);color:var(--navy);background:rgba(13,76,143,.04);transform:translateY(-1px)}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:20px;box-shadow:var(--sh-sm);transition:box-shadow .3s var(--ease),transform .3s var(--ease),border-color .25s}
.card:hover{box-shadow:var(--sh-hover);transform:translateY(-4px)}

/* ── HERO ── */
.hero-bg{background:#ffffff!important}
.hero-grid{background-image:linear-gradient(rgba(13,76,143,.05) 1px,transparent 1px),linear-gradient(90deg,rgba(13,76,143,.05) 1px,transparent 1px);background-size:52px 52px}
.grad-text{background:linear-gradient(120deg,var(--navy) 0%,var(--sky) 50%,var(--orange) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.shimmer{background:linear-gradient(90deg,var(--orange),var(--orange-s),#FBBF24,var(--orange));background-size:300% 100%;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:shimmer 3.5s linear infinite}

/* ── MARQUEE ── */
.mq-wrap{overflow:hidden;-webkit-mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent);mask-image:linear-gradient(90deg,transparent,#000 12%,#000 88%,transparent)}
.mq-track{display:flex;width:max-content;animation:mq 28s linear infinite}
.mq-track:hover{animation-play-state:paused}

/* ── INPUTS ── */
.oh-input{width:100%;padding:13px 16px;border:1.5px solid var(--border);border-radius:10px;background:var(--bg);font-size:15px;color:var(--text);transition:border-color .2s,box-shadow .2s}
.oh-input:focus{outline:none;border-color:var(--navy);box-shadow:0 0 0 4px rgba(13,76,143,.12)}
.oh-input::placeholder{color:var(--faint)}
[data-theme="dark"] .oh-input{background:rgba(255,255,255,.05)}

/* ── TOGGLE ── */
.tog{width:42px;height:24px;border-radius:12px;background:var(--border);border:none;cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
.tog.on{background:var(--navy)}
.tog-k{position:absolute;top:3px;left:3px;width:18px;height:18px;border-radius:50%;background:#fff;transition:transform .3s var(--spring);box-shadow:0 1px 4px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:10px;line-height:1}
.tog.on .tog-k{transform:translateX(18px)}

/* ── BACK TOP ── */
#bt{position:fixed;bottom:32px;left:32px;z-index:200;width:44px;height:44px;border-radius:50%;background:var(--navy);color:#fff;border:none;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;transform:translateY(8px) scale(.9);transition:opacity .3s,transform .3s;box-shadow:0 4px 18px rgba(13,76,143,.3)}
#bt.on{opacity:1;transform:none}
#bt:hover{background:var(--navy-m)}
@media(max-width:767px){#bt{display:none}}

/* ── WA FAB ── */
.wa-fab{position:fixed;bottom:28px;right:28px;z-index:200;width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#25D366,#128C7E);display:flex;align-items:center;justify-content:center;text-decoration:none;animation:pulse-g 3s ease-in-out infinite;transition:transform .2s var(--spring);box-shadow:0 6px 24px rgba(37,211,102,.4)}
.wa-fab:hover{transform:scale(1.12) translateY(-2px)}
.wa-tip{position:absolute;right:70px;top:50%;transform:translateY(-50%) translateX(8px);background:var(--text);color:var(--bg);padding:8px 14px;border-radius:10px;font-size:12px;font-weight:600;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;box-shadow:var(--sh-md)}
.wa-tip::after{content:'';position:absolute;right:-5px;top:50%;transform:translateY(-50%);border-left:6px solid var(--text);border-top:5px solid transparent;border-bottom:5px solid transparent}
.wa-fab:hover .wa-tip{opacity:1;transform:translateY(-50%) translateX(0)}
.wa-sticky{display:none;position:fixed;bottom:0;left:0;right:0;z-index:300;background:linear-gradient(90deg,#25D366,#128C7E);padding:14px 20px;padding-bottom:calc(14px + env(safe-area-inset-bottom,0));align-items:center;justify-content:center;gap:10px;text-decoration:none;color:#fff;font-weight:800;font-size:15px;box-shadow:0 -4px 24px rgba(37,211,102,.28)}
@media(max-width:767px){.wa-sticky{display:flex}.wa-fab{display:none!important}}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:10px}

/* ── KEYFRAMES ── */
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shimmer{0%{background-position:-300% center}100%{background-position:300% center}}
@keyframes mq{from{transform:translateX(0)}to{transform:translateX(-50%)}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
@keyframes cf{0%,100%{transform:translateY(0) rotate(0)}33%{transform:translateY(-7px) rotate(.3deg)}66%{transform:translateY(-3px) rotate(-.15deg)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-12px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px)}to{opacity:1;transform:none}}
@keyframes pulse-g{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.45),0 6px 24px rgba(37,211,102,.35)}60%{box-shadow:0 0 0 14px rgba(37,211,102,0),0 6px 24px rgba(37,211,102,.35)}}
@keyframes glow-g{0%,100%{box-shadow:0 4px 20px rgba(37,211,102,.32)}50%{box-shadow:0 6px 36px rgba(37,211,102,.55)}}
@keyframes scrollDot{0%,100%{transform:translateY(0);opacity:1}60%{transform:translateY(10px);opacity:0}}
@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.15s!important}html{scroll-behavior:auto}}
</style>
</head>
<body>

<div id="loader">
  <div class="ld-ring"></div>
  <img src="uploads/logo.svg" alt="Oklah Hub" style="height:32px;filter:brightness(0) invert(1);opacity:.6;margin-top:6px" onerror="this.style.display='none'" />
</div>
<div id="root"></div>
<div id="progress-bar"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── BRAND ── */
const WA = '2349115581148';
const waHref = msg => `https://wa.me/${WA}?text=${encodeURIComponent(msg)}`;

/* ── HOOKS ── */
function useDark() {
  const [dark, setDark] = useState(() => {
    if (typeof window === 'undefined') return false;
    const s = localStorage.getItem('oh-theme');
    return s ? s === 'dark' : window.matchMedia('(prefers-color-scheme:dark)').matches;
  });
  useEffect(() => {
    document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
    localStorage.setItem('oh-theme', dark ? 'dark' : 'light');
  }, [dark]);
  return [dark, setDark];
}

function useMobile() {
  const [m, setM] = useState(typeof window !== 'undefined' ? window.innerWidth < 768 : false);
  useEffect(() => {
    const f = () => setM(window.innerWidth < 768);
    window.addEventListener('resize', f, { passive: true });
    return () => window.removeEventListener('resize', f);
  }, []);
  return m;
}

function useReveal() {
  useEffect(() => {
    const els = document.querySelectorAll('.rv,.rv-l,.rv-r,.rv-sc');
    const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) e.target.classList.add('on') }), { threshold: .07 });
    els.forEach(el => io.observe(el));
    return () => io.disconnect();
  });
}

function useScroll() {
  useEffect(() => {
    const bar = document.getElementById('progress-bar');
    const btn = document.getElementById('bt');
    const f = () => {
      const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
      if (bar) bar.style.width = pct + '%';
      if (btn) btn.classList.toggle('on', window.scrollY > 400);
    };
    window.addEventListener('scroll', f, { passive: true });
    return () => window.removeEventListener('scroll', f);
  }, []);
}

function useActiveSection() {
  const [a, setA] = useState('');
  useEffect(() => {
    const io = new IntersectionObserver(es => es.forEach(e => { if (e.isIntersecting) setA(e.target.id) }), { threshold: .25 });
    ['services','pricing','about','contact'].forEach(id => { const el = document.getElementById(id); if (el) io.observe(el) });
    return () => io.disconnect();
  }, []);
  return a;
}

/* ── COUNTER ── */
function Counter({ to, suffix = '', dur = 1100 }) {
  const [v, setV] = useState(0);
  const ref = useRef(null);
  const done = useRef(false);
  useEffect(() => {
    if (!ref.current) return;
    const io = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !done.current) {
        done.current = true;
        const t0 = performance.now();
        const tick = ts => {
          const p = Math.min((ts - t0) / dur, 1);
          setV(Math.round((1 - Math.pow(1 - p, 3)) * to));
          if (p < 1) requestAnimationFrame(tick);
        };
        requestAnimationFrame(tick);
        io.disconnect();
      }
    }, { threshold: .5 });
    io.observe(ref.current);
    return () => io.disconnect();
  }, [to, dur]);
  return <span ref={ref}>{v}{suffix}</span>;
}

/* ── ICONS ── */
const WaIco = ({ s = 18 }) => (
  <svg width={s} height={s} viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
    <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
  </svg>
);

const StarIco = () => (
  <svg width="13" height="13" viewBox="0 0 24 24" fill="#FBBF24" aria-hidden="true">
    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
  </svg>
);

const Chk = ({ c = 'var(--navy)', sz = 10 }) => (
  <svg width={sz} height={sz} viewBox="0 0 10 10" fill="none" aria-hidden="true">
    <path d="M2 5l2.5 2.5L8 3" stroke={c} strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
  </svg>
);

/* ── LOGO ── */
const Logo = ({ h = 32, inv = false }) => (
  <img src="uploads/logo.svg" alt="Oklah Hub"
    style={{ height: h, objectFit: 'contain', display: 'block', filter: inv ? 'brightness(0) invert(1)' : 'none' }}
    onError={e => { e.currentTarget.src = 'uploads/logo_file-1776618871769.jpg' }}
  />
);

/* ── THEME TOGGLE ── */
const Toggle = ({ dark, set }) => (
  <button className={`tog ${dark ? 'on' : ''}`} onClick={() => set(d => !d)} aria-label={dark ? 'Light mode' : 'Dark mode'}>
    <div className="tog-k">{dark ? '🌙' : '☀️'}</div>
  </button>
);

/* ── WA BUTTON ── */
function WaBtn({ msg = 'Hi Oklah Hub! I want to get started.', label, full, lg, ghost }) {
  const base = {
    display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 9,
    padding: lg ? '16px 28px' : '13px 22px',
    borderRadius: 12, fontWeight: 800, fontSize: lg ? 16 : 14,
    textDecoration: 'none', width: full ? '100%' : 'auto', minHeight: lg ? 54 : 48,
    transition: 'transform .15s,box-shadow .2s'
  };
  if (ghost) return (
    <a href={waHref(msg)} target="_blank" rel="noopener" className="btn btn-o" style={{ ...base, gap: 8 }}>
      <WaIco s={14} />{label || 'Chat on WhatsApp'}
    </a>
  );
  return (
    <a href={waHref(msg)} target="_blank" rel="noopener" className="btn btn-g" style={base}>
      <WaIco s={14} />{label || 'Chat on WhatsApp'}
    </a>
  );
}

/* ── NAV ── */
function Nav({ mob, dark, setDark }) {
  const [scrolled, setScrolled] = useState(false);
  const [menu, setMenu] = useState(false);
  const active = useActiveSection();

  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 20);
    window.addEventListener('scroll', h, { passive: true });
    return () => window.removeEventListener('scroll', h);
  }, []);

  useEffect(() => {
    document.body.style.overflow = menu ? 'hidden' : '';
    return () => { document.body.style.overflow = '' };
  }, [menu]);

  const links = ['Services', 'Pricing', 'About', 'Contact'];

  return (
    <>
      <header style={{
        position: 'fixed', top: 0, left: 0, right: 0, zIndex: 100,
        transition: 'all .3s',
        background: scrolled ? undefined : 'transparent',
        borderBottom: scrolled ? undefined : '1px solid transparent'
      }} className={scrolled ? 'nav-glass' : ''}>
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: mob ? '0 16px' : '0 32px', height: mob ? 60 : 68, display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 24 }}>
          <a href="#" aria-label="Oklah Hub home" style={{ textDecoration: 'none' }}>
            <Logo h={mob ? 26 : 30} inv={false} />
          </a>
          {mob ? (
            <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
              <Toggle dark={dark} set={setDark} />
              <button onClick={() => setMenu(true)} aria-label="Open menu" style={{ background: 'none', border: 'none', cursor: 'pointer', padding: 8, display: 'flex', flexDirection: 'column', gap: 5 }}>
                {[0,1,2].map(i => <span key={i} style={{ display: 'block', width: 20, height: 2, background: 'var(--text)', borderRadius: 2 }} />)}
              </button>
            </div>
          ) : (

    e.preventDefault();
    const text = `Hi Oklah Hub!%0A%0AName: ${form.name}%0ABusiness: ${form.business}%0AEmail: ${form.email}%0AService: ${form.service}%0A%0A${form.message}`;

    setTimeout(() => setSent(false), 5000);

    <section id="contact" style={{ background: 'var(--bg)', padding: mob ? '64px 20px' : '96px 32px', borderTop: '1px solid var(--border)' }}>
